        <h1>什么是HTML</h1>
        <hr>
        <p>HTML是超文本标记语言（HyperText Markup Language）的缩写，它是一种用于创建网页的标准标记语言。<br>
            HTML由标签组成，每个标签都有一个开始标签和一个结束标签。标签之间可以包含文本、图片、视频等内容。</p>
