<html lang="zh-CN">

<body>
    <header id="top">
        <h1>我的年度私藏歌单</h1>
    </header>

    <main>
        <section>
            <p>这是一个音乐网站，我特别喜欢音乐。这里记录了我最近循环播放的歌曲。</p>
            <ul>
                <li><strong><a href="https://www.baidu.com" target="_blank">小小奇迹</a></strong></li>
                <li><strong><a href="https://www.baidu.com" target="_blank">若能绽放光芒</a></strong></li>

            </ul>

        <img src="./assets/album-cover.png" alt="歌手专辑封面照片" width="200">

        <div>
            <h3>试听片段：</h3>
            <audio src="music_sample.mp3" controls>你的浏览器不支持音频播放</audio>
        </div>

        <aside>
            <h3>音乐小知识</h3>
            <dl>
                <dt><strong>Lo-fi (Low Fidelity)</strong></dt>
                <dd>意为“低保真”，通常指故意保留环境噪音、磁带底噪的音乐风格，听起来很治愈。</dd>
                <dt><strong>BPM (Beats Per Minute)</strong></dt>
                <dd>每分钟节拍数，用来衡量音乐的速度快慢。</dd>
            </dl>
        </aside>
    </main>
